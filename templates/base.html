<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Tugas 2{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #eaf2ff;
            --surface: #ffffff;
            --surface-soft: #f4f8ff;
            --text: #1b2b5a;
            --muted: #6b7a99;
            --accent: #0e5a64;
            --accent-soft: #dcecf0;
            --line: #c8ddf6;
            --highlight: #ffc107;
            --highlight-soft: #fff1bf;
            --shadow: 0 18px 44px rgba(8, 24, 68, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Manrope", "Segoe UI", sans-serif;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            font: inherit;
        }

        h1,
        h2,
        h3,
        p {
            margin: 0;
        }

        .page-shell {
            width: min(1120px, calc(100% - 40px));
            margin: 0 auto;
            padding: 26px 0 56px;
        }

        .surface {
            background: var(--surface);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
        }

        .site-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 16px 22px;
            margin-bottom: 26px;
            border-radius: 14px;
        }

        .nav-brand {
            display: inline-flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 1px solid var(--line);
            background: var(--highlight-soft);
            color: var(--text);
            font-size: 0.86rem;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .brand-text {
            display: grid;
            gap: 2px;
        }

        .brand-title {
            font-size: 0.98rem;
            font-weight: 700;
        }

        .brand-subtitle {
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 500;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }

        .nav-link {
            border: 0;
            background: transparent;
            padding: 0;
            color: var(--muted);
            cursor: default;
            font-size: 0.92rem;
            font-weight: 600;
        }

        .nav-link.is-active {
            color: var(--text);
        }

        .nav-link.is-active::after {
            content: "";
            display: block;
            width: 100%;
            height: 2px;
            margin-top: 6px;
            background: var(--accent);
        }

        .profile-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 8px 10px 8px 8px;
            border: 1px solid var(--line);
            background: var(--surface-soft);
            cursor: default;
        }

        .profile-avatar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            background: var(--accent);
            color: #fff;
            font-size: 0.82rem;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .profile-meta {
            display: grid;
            gap: 2px;
        }

        .profile-meta strong {
            font-size: 0.88rem;
            line-height: 1.1;
        }

        .profile-meta span {
            color: var(--muted);
            font-size: 0.76rem;
            line-height: 1.1;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
            gap: 28px;
            padding: 42px;
            margin-bottom: 20px;
            border-radius: 18px;
        }

        .hero-copy {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 420px;
        }

        .hero-kicker {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .hero-kicker::before {
            content: "";
            width: 30px;
            height: 1px;
            background: var(--highlight);
        }

        .hero-title {
            max-width: 10ch;
            font-family: "Fraunces", Georgia, serif;
            font-size: clamp(3rem, 5.4vw, 5.4rem);
            line-height: 0.95;
            letter-spacing: -0.05em;
        }

        .hero-title span {
            display: block;
            color: var(--accent);
        }

        .hero-text {
            max-width: 52ch;
            margin-top: 20px;
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.85;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 148px;
            padding: 12px 16px;
            border: 1px solid var(--line);
            background: transparent;
            cursor: default;
            font-size: 0.92rem;
            font-weight: 700;
        }

        .button-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .button-secondary {
            background: var(--surface-soft);
            color: var(--text);
        }

        .hero-side {
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 16px;
            padding-left: 6px;
        }

        .side-note {
            padding: 18px;
            border: 1px solid var(--line);
            background: var(--surface-soft);
        }

        .side-note h2,
        .side-note h3 {
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .side-note p {
            color: var(--muted);
            font-size: 0.92rem;
            line-height: 1.8;
        }

        .feature-strip {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            border: 1px solid var(--line);
            border-radius: 16px;
            overflow: hidden;
        }

        .feature-item {
            min-height: 220px;
            padding: 22px;
            background: var(--surface);
        }

        .feature-item+.feature-item {
            border-left: 1px solid var(--line);
        }

        .feature-index {
            display: inline-block;
            margin-bottom: 18px;
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        .feature-item h3 {
            margin-bottom: 10px;
            font-size: 1.05rem;
        }

        .feature-item p {
            color: var(--muted);
            font-size: 0.94rem;
            line-height: 1.8;
        }

        @media (max-width: 1020px) {
            .site-nav {
                align-items: flex-start;
                flex-direction: column;
            }

            .nav-menu {
                gap: 14px;
            }
        }

        @media (max-width: 900px) {

            .hero,
            .feature-strip {
                grid-template-columns: 1fr;
            }

            .hero-copy {
                min-height: auto;
            }

            .feature-item+.feature-item {
                border-left: 0;
                border-top: 1px solid var(--line);
            }
        }

        @media (max-width: 640px) {
            .page-shell {
                width: min(100% - 28px, 1120px);
                padding-top: 20px;
            }

            .site-nav,
            .hero {
                padding: 18px;
            }

            .hero-title {
                max-width: none;
                font-size: clamp(2.5rem, 14vw, 4.2rem);
            }

            .hero-actions {
                flex-direction: column;
            }

            .button,
            .profile-button {
                width: 100%;
            }
        }

        {% if theme %}
        :root {
            --bg: {{ theme.bg_color }};
            --accent: {{ theme.accent_color }};
            --text: {{ theme.text_color }};
            --highlight: {{ theme.highlight_color }};
            --surface: {{ theme.surface_color }};
        }
        {% endif %}
    </style>
</head>

<body>
    <div class="page-shell">
        <header class="site-nav surface">
            <div class="nav-brand">
                <span class="brand-mark">CN</span>
                <span class="brand-text">
                    <span class="brand-title">CacingNaga</span>
                    <span class="brand-subtitle">Authentication & Authorization</span>
                </span>
            </div>

            <nav class="nav-menu">
                <button class="nav-link is-active" type="button">Home</button>
                <button class="nav-link" type="button">Overview</button>
                <button class="nav-link" type="button">Features</button>
                <button class="nav-link" type="button">Contact</button>
            </nav>

            {% if user.is_authenticated %}
            <form method="post" action="{% url 'account_logout' %}" style="display: inline;">
                {% csrf_token %}
                <button class="profile-button" type="submit">
                    <span class="profile-avatar">{{ user.first_name|default:user.username|slice:":1"|upper }}</span>
                    <span class="profile-meta">
                        <strong>{{ user.first_name|default:user.username }}</strong>
                        <span>Logout</span>
                    </span>
                </button>
            </form>
            {% else %}
            {% load socialaccount %}
            <form action="{% provider_login_url 'google' %}" method="post" style="display: inline;">
                {% csrf_token %}
                <button class="profile-button" type="submit" style="padding: 8px 16px;">
                    <strong>Login</strong>
                </button>
            </form>
            {% endif %}
        </header>

        {% block content %}{% endblock %}
    </div>
</body>

</html>
