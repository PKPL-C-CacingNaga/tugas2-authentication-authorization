{% extends 'base.html' %}

{% block content %}
<div style="
    background: var(--surface);
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    border-radius: 18px;
    padding: 42px;
    max-width: 600px;
    margin: 0 auto;
">
    <h2 style="
        font-family: 'Fraunces', Georgia, serif;
        font-size: 2rem;
        letter-spacing: -0.03em;
        margin-bottom: 8px;
        color: var(--text);
    ">Ubah Tampilan</h2>
    <p style="color: var(--muted); font-size: 0.94rem; margin-bottom: 32px;">
        Perubahan akan langsung tampil di seluruh halaman website.
    </p>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div style="margin-bottom: 20px;">
            <label style="
                display: block;
                font-size: 0.88rem;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 8px;
            ">{{ field.label }}</label>
            <div style="display: flex; align-items: center; gap: 12px;">
                {{ field }}
                <span style="
                    font-size: 0.82rem;
                    color: var(--muted);
                " id="val-{{ field.name }}"></span>
            </div>
        </div>
        {% endfor %}

        <button type="submit" style="
            margin-top: 12px;
            padding: 12px 28px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
        ">Simpan Perubahan</button>
    </form>
</div>

<script>
    document.querySelectorAll('input[type="color"]').forEach(input => {
        const label = document.getElementById('val-' + input.name);
        if (label) label.textContent = input.value;
        input.addEventListener('input', () => {
            if (label) label.textContent = input.value;
        });
    });
</script>
{% endblock %}
